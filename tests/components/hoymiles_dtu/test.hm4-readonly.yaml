substitutions:
  board: esp32-s2-saola-1
  framework: arduino

esphome:
  name: hoymiles-dtu-hm4-readonly

esp32:
  board: ${board}
  framework:
    type: ${framework}

logger:
  level: DEBUG
  hardware_uart: USB_CDC

spi:
  id: dtu_spi
  clk_pin: GPIO5
  mosi_pin: GPIO11
  miso_pin: GPIO16

external_components:
  - source:
      type: local
      path: ../../../components
    components: [hoymiles_dtu]

hoymiles_dtu:
  id: dtu
  spi_id: dtu_spi
  cs_pin: GPIO9
  ce_pin: GPIO12
  irq_pin: GPIO7
  poll_interval: 15s
  pa_level: low
  inverters:
    - id: hm4
      serial: "114180000000"
      model: hm_1500

sensor:
  - platform: hoymiles_dtu
    inverter_id: hm4
    ac_power:
      name: "HM4 AC Power"
    ac_voltage:
      name: "HM4 AC Voltage"
    ac_current:
      name: "HM4 AC Current"
    ac_frequency:
      name: "HM4 AC Frequency"
    temperature:
      name: "HM4 Temperature"
    yield_today:
      name: "HM4 Yield Today"
    yield_total:
      name: "HM4 Yield Total"
    channels:
      - number: 1
        dc_voltage:
          name: "HM4 CH1 DC Voltage"
        dc_current:
          name: "HM4 CH1 DC Current"
        dc_power:
          name: "HM4 CH1 DC Power"
        yield_today:
          name: "HM4 CH1 Yield Today"
      - number: 2
        dc_voltage:
          name: "HM4 CH2 DC Voltage"
        dc_current:
          name: "HM4 CH2 DC Current"
        dc_power:
          name: "HM4 CH2 DC Power"
        yield_today:
          name: "HM4 CH2 Yield Today"
      - number: 3
        dc_voltage:
          name: "HM4 CH3 DC Voltage"
        dc_current:
          name: "HM4 CH3 DC Current"
        dc_power:
          name: "HM4 CH3 DC Power"
        yield_today:
          name: "HM4 CH3 Yield Today"
      - number: 4
        dc_voltage:
          name: "HM4 CH4 DC Voltage"
        dc_current:
          name: "HM4 CH4 DC Current"
        dc_power:
          name: "HM4 CH4 DC Power"
        yield_today:
          name: "HM4 CH4 Yield Today"

text_sensor:
  - platform: hoymiles_dtu
    inverter_id: hm4
    status:
      name: "HM4 Status"
    last_seen:
      name: "HM4 Last Seen"
  - platform: hoymiles_dtu
    dtu_id: dtu
    last_tx:
      name: "DTU Last TX"
    last_rx_payload:
      name: "DTU Last RX Payload"
    last_register_dump:
      name: "DTU Last Register Dump"
    last_radio_error:
      name: "DTU Last Radio Error"

button:
  - platform: template
    name: "DTU Radio Dump"
    on_press:
      - hoymiles_dtu.radio_dump: dtu
  - platform: template
    name: "DTU Radio Request BCD"
    on_press:
      - hoymiles_dtu.radio_send_request:
          id: dtu
          serial: "116182806989"
          serial_format: bcd
          tx_channel: 3
          rx_offset: 3
          rx_window_ms: 520
          rx_dwell_ms: 8
          pa_level: low
  - platform: template
    name: "DTU Radio Raw"
    on_press:
      - hoymiles_dtu.radio_send_raw:
          id: dtu
          address: "01 82 80 69 89"
          tx_channel: 3
          payload: "15 89 69 80 82 60 54 91 83 80 0B 00"
          rx_offset: 3
          rx_window_ms: 120
          rx_dwell_ms: 8
          pa_level: low
  - platform: template
    name: "DTU Radio Listen"
    on_press:
      - hoymiles_dtu.radio_listen:
          id: dtu
          channel: 3
          window_ms: 120
          dwell_ms: 8
