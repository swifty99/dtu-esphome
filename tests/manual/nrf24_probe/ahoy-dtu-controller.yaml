substitutions:
  plug_name: ahoy-dtu-nrf24-probe
  device_name: ${plug_name}

packages:
  device_base: !include packages/device_base_debug.yaml
  default_diag: !include packages/default_diag.yaml

esphome:
  name: ${plug_name}
  friendly_name: Ahoy DTU nRF24 Probe
  on_boot:
    priority: 600
    then:
      - logger.log: "Booting ${plug_name} nRF24 WiFi debug firmware"

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

logger:
  level: DEBUG
  hardware_uart: USB_CDC

external_components:
  - source:
      type: local
      path: ../components
    components: [nrf24_probe]

nrf24_probe:
  id: probe
  ce_pin: 12
  cs_pin: 9
  sck_pin: 5
  mosi_pin: 11
  miso_pin: 16
  irq_pin: 7
