substitutions:
  plug_name: ahoy-dtu-hm4-readonly
  device_name: ${plug_name}

packages:
  device_base: !include ../nrf24_probe/packages/device_base_debug.yaml
  default_diag: !include ../nrf24_probe/packages/default_diag.yaml

esphome:
  name: ${plug_name}
  friendly_name: Ahoy DTU HM4 Read-Only

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

logger:
  # INFO keeps the per-poll "Telemetry ..." summary and exchange/warn lines but drops the noisy
  # per-fragment RX debug. Set to DEBUG when diagnosing the radio link or watching scan detection.
  level: INFO
  hardware_uart: USB_CDC

# Real time so realtime requests (0x0B) carry a valid epoch instead of a millis stub.
time:
  - platform: sntp
    id: dtu_time

spi:
  id: dtu_spi
  clk_pin: GPIO5
  mosi_pin: GPIO11
  miso_pin: GPIO16

external_components:
  - source:
      type: local
      path: ../../../components
    components: [hoymiles_dtu]

hoymiles_dtu:
  id: dtu
  spi_id: dtu_spi
  cs_pin: GPIO9
  ce_pin: GPIO12
  irq_pin: GPIO7
  update_interval: 15s
  # max validated on hardware (100% TX_DS / reliable acquisition). Lower it only if your link is
  # strong and you want less RF/power; the standalone link is sensitive to TX power.
  pa_level: max
  # Passive, receive-only detection of Search-ID scans / foreign control of this inverter (CCC report).
  # Monitors between telemetry polls; publishes to the scan_detected text sensor below.
  scan_detection: true
  inverters:
    - id: hm4
      # Printed inverter serial (packed BCD under the hood). Move to !secret hoymiles_hm4_serial if
      # you prefer to keep it out of the config.
      serial: "116182806989"
      model: hm_1200

sensor:
  - platform: hoymiles_dtu
    inverter_id: hm4
    ac_power: {name: "HM4 AC Power"}
    ac_voltage: {name: "HM4 AC Voltage"}
    ac_current: {name: "HM4 AC Current"}
    ac_frequency: {name: "HM4 AC Frequency"}
    reactive_power: {name: "HM4 Reactive Power"}
    power_factor: {name: "HM4 Power Factor"}
    temperature: {name: "HM4 Temperature"}
    yield_today: {name: "HM4 Yield Today"}
    yield_total: {name: "HM4 Yield Total"}
    channels:
      - number: 1
        dc_voltage: {name: "HM4 CH1 DC Voltage"}
        dc_current: {name: "HM4 CH1 DC Current"}
        dc_power: {name: "HM4 CH1 DC Power"}
        yield_today: {name: "HM4 CH1 Yield Today"}
      - number: 2
        dc_voltage: {name: "HM4 CH2 DC Voltage"}
        dc_current: {name: "HM4 CH2 DC Current"}
        dc_power: {name: "HM4 CH2 DC Power"}
        yield_today: {name: "HM4 CH2 Yield Today"}
      - number: 3
        dc_voltage: {name: "HM4 CH3 DC Voltage"}
        dc_current: {name: "HM4 CH3 DC Current"}
        dc_power: {name: "HM4 CH3 DC Power"}
        yield_today: {name: "HM4 CH3 Yield Today"}
      - number: 4
        dc_voltage: {name: "HM4 CH4 DC Voltage"}
        dc_current: {name: "HM4 CH4 DC Current"}
        dc_power: {name: "HM4 CH4 DC Power"}
        yield_today: {name: "HM4 CH4 Yield Today"}

text_sensor:
  - platform: hoymiles_dtu
    inverter_id: hm4
    status: {name: "HM4 Status"}
    last_seen: {name: "HM4 Last Seen"}
  - platform: hoymiles_dtu
    dtu_id: dtu
    scan_detected: {name: "HM4 Scan Detected"}
    last_rx_payload: {name: "DTU Last RX Payload"}
    last_radio_error: {name: "DTU Last Radio Error"}
