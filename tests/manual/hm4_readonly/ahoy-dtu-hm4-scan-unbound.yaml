substitutions:
  plug_name: ahoy-dtu-hm4-readonly
  device_name: ${plug_name}

packages:
  device_base: !include ../nrf24_probe/packages/device_base_debug.yaml
  default_diag: !include ../nrf24_probe/packages/default_diag.yaml

esphome:
  name: ${plug_name}
  friendly_name: Ahoy DTU HM4 Scan (unbound)
  # HIL variant that lets the inverter go UNBOUND before scanning, to exercise the Search-ID (0x02)
  # path: with update_interval 60min the component does not poll during the window, so ~15 min after
  # the previous firmware's last poll the inverter starts answering Search-ID again. Fire one scan at
  # 18 min (well past that timeout). Daytime only — the inverter must be powered (answering) to reply.
  on_boot:
    priority: -100
    then:
      - delay: 18min
      - logger.log: "HIL: starting UNBOUND inverter scan (0x02 window)"
      - hoymiles_dtu.scan_inverters:
          id: dtu
          duration: 40s
          commands: [search_id, collect_info]

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

logger:
  level: DEBUG
  hardware_uart: USB_CDC

time:
  - platform: sntp
    id: dtu_time

spi:
  id: dtu_spi
  clk_pin: GPIO5
  mosi_pin: GPIO11
  miso_pin: GPIO16

external_components:
  - source:
      type: local
      path: ../../../components
    components: [hoymiles_dtu]

hoymiles_dtu:
  id: dtu
  spi_id: dtu_spi
  cs_pin: GPIO9
  ce_pin: GPIO12
  irq_pin: GPIO7
  # 60 min: effectively no polling during the 18-min unbound window (PollingComponent's first tick is
  # one interval after boot), so the inverter is not re-bound before the scan.
  update_interval: 60min
  pa_level: max
  scan_detection: false
  inverters:
    - id: hm4
      serial: "116182806989"
      model: hm_1200

sensor:
  - platform: hoymiles_dtu
    dtu_id: dtu
    scan_found_count: {name: "HM4 Scan Found"}

text_sensor:
  - platform: hoymiles_dtu
    dtu_id: dtu
    scan_result: {name: "HM4 Scan Result"}
    last_rx_payload: {name: "DTU Last RX Payload"}
    last_radio_error: {name: "DTU Last Radio Error"}
