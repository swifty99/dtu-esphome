# Self-contained, WiFi-free HM link probe.
#
# Purpose: prove the nRF24 link to the HM-1200 (serial 116182806989) by sweeping
# the radio_send_request debug action across all HM channels using the BCD serial
# format (the Ahoy-correct address 01 82 80 69 89), independent of the normal poll
# loop. Flash over USB/OTA and read the logs:
#   - "Debug TX ch=.. addr=01 82 80 69 89 .."  -> hitting the right address
#   - "Debug TX_DS status=0x2X"                -> inverter ACKed (link works!)
#   - "RX payload len=.. data=.."              -> inverter returned data frames
#   - "Debug MAX_RT" on every channel          -> no ACK (see plan branch points)
#
# Flash + logs:
#   esphome run tests/manual/hm4_readonly/hm-link-probe.yaml \
#     --device /dev/cu.usbmodem207NTUW3X9582

substitutions:
  device_name: hm-link-probe

# WiFi + API + OTA (so future flashes go over the air, no USB download-mode dance).
packages:
  device_base: !include ../nrf24_probe/packages/device_base_debug.yaml

esphome:
  name: ${device_name}
  friendly_name: HM Link Probe

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

logger:
  level: DEBUG
  hardware_uart: USB_CDC

time:
  - platform: sntp
    id: sntp_time

spi:
  id: dtu_spi
  clk_pin: GPIO5
  mosi_pin: GPIO11
  miso_pin: GPIO16

external_components:
  - source:
      type: local
      path: ../../../components
    components: [hoymiles_dtu]

hoymiles_dtu:
  id: dtu
  spi_id: dtu_spi
  cs_pin: GPIO9
  ce_pin: GPIO12
  irq_pin: GPIO7
  # Acquisition test: each poll now fires an Ahoy-style burst (send -> on no-ACK retransmit on the
  # next channel, up to MAX_TX_ATTEMPTS) so a 2s cadence ~= continuous channel sweeping. Back off to
  # 15s once the link is acquired.
  poll_interval: 2s
  pa_level: max
  inverters:
    - id: hm4
      serial: "116182806989"
      model: hm_1200

sensor:
  - platform: hoymiles_dtu
    inverter_id: hm4
    ac_power: {name: "HM4 AC Power"}
    ac_voltage: {name: "HM4 AC Voltage"}
    ac_frequency: {name: "HM4 AC Frequency"}
    temperature: {name: "HM4 Temperature"}
    yield_total: {name: "HM4 Yield Total"}

text_sensor:
  - platform: hoymiles_dtu
    inverter_id: hm4
    status: {name: "HM4 Status"}
    last_seen: {name: "HM4 Last Seen"}
  - platform: hoymiles_dtu
    dtu_id: dtu
    last_tx: {name: "DTU Last TX"}
    last_rx_payload: {name: "DTU Last RX Payload"}
    last_radio_error: {name: "DTU Last Radio Error"}

# Diagnostic radio_dump / radio_send_request intervals removed: the poll loop now drives the real
# request+burst path continuously, so those would just contend for the (rarely idle) radio.
