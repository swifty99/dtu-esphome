name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest esphome
      - run: pytest tests/unit

  compile:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:2026.6.3
    strategy:
      fail-fast: false
      matrix:
        target:
          - test.esp32-arduino.yaml
          - test.esp32-idf.yaml
          - test.esp32s3-arduino.yaml
          - test.esp32s3-idf.yaml
          - test.multi-model.yaml
          - test.scan-detect.yaml
    steps:
      - uses: actions/checkout@v4
      - run: esphome compile tests/components/hoymiles_dtu/${{ matrix.target }}
